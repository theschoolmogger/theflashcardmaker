<!DOCTYPE html>
<html>
<head>
  <title>Flash Card Maker</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .tab {
      cursor: pointer;
      padding: 10px 20px;
      background: #1e293b;
      border-radius: 10px;
    }

    .tab:hover {
      background: #334155;
    }

    .section {
      display: none;
    }

    .active {
      display: block;
    }

    iframe {
      max-width: 100%;
    }
  </style>
</head>
<body>

<h1>🏀 March Madness Tracker</h1>

<div class="tabs">
  <div class="tab" onclick="showTab('scores')">Scores</div>
  <div class="tab" onclick="showTab('bracket')">Bracket</div>
  <div class="tab" onclick="showTab('highlights')">Highlights</div>
</div>

<div id="scores" class="section active">
  <h2>Live Scores</h2>
  <iframe src="https://www.espn.com/mens-college-basketball/scoreboard" width="100%" height="600"></iframe>
</div>

<div id="bracket" class="section">
  <h2>Bracket</h2>
  <img src="https://www.ncaa.com/_flysystem/public-s3/images/2024-03/march-madness-bracket.png" width="100%">
</div>

<div id="highlights" class="section">
  <h2>Highlights</h2>

  <iframe width="560" height="315"
  src="https://www.youtube.com/embed/VIDEO_ID"
  frameborder="0" allowfullscreen></iframe>

</div>

<script>
function showTab(tab) {
  document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}
</script>

</body>
</html>
