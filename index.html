<!DOCTYPE html>
<html>
<head>
  <title>March Madness Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .tab {
      cursor: pointer;
      padding: 10px 20px;
      background: #1e293b;
      border-radius: 10px;
    }

    .tab:hover {
      background: #334155;
    }

    .section {
      display: none;
    }

    .active {
      display: block;
    }

    .game {
      background: #1e293b;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>🏀 March Madness Tracker</h1>

<div class="tabs">
  <div class="tab" onclick="showTab('scores')">Scores</div>
  <div class="tab" onclick="showTab('bracket')">Bracket</div>
  <div class="tab" onclick="showTab('highlights')">Highlights</div>
</div>

<!-- SCORES -->
<div id="scores" class="section active">
  <h2>Live Scores</h2>
  <div id="scoresContainer">Loading...</div>
</div>

<!-- BRACKET -->
<div id="bracket" class="section">
  <h2>Bracket</h2>
  <img src="https://www.ncaa.com/_flysystem/public-s3/images/2024-03/march-madness-bracket.png" width="100%">
</div>

<!-- HIGHLIGHTS -->
<div id="highlights" class="section">
  <h2>Highlights</h2>

  <iframe width="300" height="200"
  src="https://www.youtube.com/embed/1rEnj1dVnUM"
  frameborder="0" allowfullscreen></iframe>

  <iframe width="300" height="200"
  src="https://www.youtube.com/watch?v=qwx0yWsfURA"
  frameborder="0" allowfullscreen></iframe>

</div>

<script>
function showTab(tab) {
  document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}

// 🔑 PUT YOUR API KEY HERE
const API_KEY = "8f0149489cmsh7c6bd7bf32203aep11b53cjsn0f047cfd0ba2";

// Example API (you may need to adjust endpoint based on which API you pick)
async function loadScores() {
  const container = document.getElementById("scoresContainer");

  try {
    const response = await fetch("https://api-basketball.p.rapidapi.com/games?league=12&season=2024", {
      method: "GET",
      headers: {
        "X-RapidAPI-Key": API_KEY,
        "X-RapidAPI-Host": "api-basketball.p.rapidapi.com"
      }
    });

    const data = await response.json();

    container.innerHTML = "";

    data.response.slice(0, 10).forEach(game => {
      const div = document.createElement("div");
      div.className = "game";

      div.innerHTML = `
        <strong>${game.teams.home.name}</strong> (${game.scores.home.points})
        vs
        <strong>${game.teams.away.name}</strong> (${game.scores.away.points})
        <br>
        Status: ${game.status.long}
      `;

      container.appendChild(div);
    });

  } catch (err) {
    container.innerHTML = "Scores couldn't load (API might be blocked).";
    console.error(err);
  }
}

// Load scores on start
loadScores();

// Auto refresh every 30 seconds
setInterval(loadScores, 30000);
</script>

</body>
</html>
